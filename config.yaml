data:
  path: "data/korean_spam_dataset.csv"
  train_ratio: 0.8
  val_ratio: 0.1
  test_ratio: 0.1
  random_state: 42

preprocessing:
  use_konlpy: false          # true 시 Java + KoNLPy 필요
  konlpy_analyzer: "Okt"    # Okt | Kkma | Komoran

ml_model:
  tfidf:
    max_features: 50000
    ngram_range: [1, 2]
    sublinear_tf: true
    min_df: 2
  logistic_regression:
    C: 1.0
    max_iter: 1000
    class_weight: "balanced"
    solver: "lbfgs"
    n_jobs: -1
  spam_threshold: 0.7

bert_model:
  base_model: "snunlp/KR-ELECTRA-discriminator"
  max_length: 256
  batch_size: 32
  epochs: 5
  learning_rate: 2.0e-5
  warmup_ratio: 0.1
  weight_decay: 0.01
  dropout: 0.3
  spam_threshold: 0.7

artifacts:
  dir: "artifacts"
  ml_model: "artifacts/ml_model.joblib"
  bert_model: "artifacts/bert_model"
